name: Mark board item Done on issue close (reusable)

on:
  workflow_call:
    secrets:
      PROJECT_TOKEN:
        description: "PAT with project scope, authorized for the yancya user account project"
        required: true

env:
  PROJECT_ID: PVT_kwHOABcbgs4AZ9fF
  STATUS_FIELD_ID: PVTSSF_lAHOABcbgs4AZ9fFzgQoRE0
  STATUS_OPTION_ID: "98236657"

jobs:
  mark-done:
    runs-on: ubuntu-latest
    steps:
      - name: Find project item for this issue and set Status=Done
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          OWNER: ${{ github.event.repository.owner.login }}
          REPO: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          item_id=$(gh api graphql -f query='
            query($owner:String!, $repo:String!, $number:Int!) {
              repository(owner:$owner, name:$repo) {
                issue(number:$number) {
                  projectItems(first: 20) {
                    nodes { id project { id } }
                  }
                }
              }
            }' -f owner="$OWNER" -f repo="$REPO" -F number="$ISSUE_NUMBER" \
            -q ".data.repository.issue.projectItems.nodes[] | select(.project.id == \"$PROJECT_ID\") | .id")

          if [ -z "$item_id" ]; then
            echo "issue $OWNER/$REPO#$ISSUE_NUMBER is not on the board; nothing to do"
            exit 0
          fi

          gh api graphql -f query='
            mutation($project:ID!, $item:ID!, $field:ID!, $optId:String!) {
              updateProjectV2ItemFieldValue(input:{projectId:$project, itemId:$item, fieldId:$field, value:{singleSelectOptionId:$optId}}) {
                projectV2Item { id }
              }
            }' -f project="$PROJECT_ID" -f item="$item_id" -f field="$STATUS_FIELD_ID" -f optId="$STATUS_OPTION_ID" > /dev/null

          echo "marked $OWNER/$REPO#$ISSUE_NUMBER done (item $item_id)"
