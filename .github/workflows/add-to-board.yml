name: Add issue to board (reusable)

on:
  workflow_call:
    inputs:
      status:
        description: "Status to set on the new project item (Todo / In Progress / Done / Waiting)"
        required: false
        type: string
        default: Todo
    secrets:
      PROJECT_TOKEN:
        description: "PAT with project scope, authorized for the yancya user account project"
        required: true

env:
  PROJECT_ID: PVT_kwHOABcbgs4AZ9fF
  STATUS_FIELD_ID: PVTSSF_lAHOABcbgs4AZ9fFzgQoRE0

jobs:
  add-to-board:
    runs-on: ubuntu-latest
    steps:
      - name: Add issue to project and set Status
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          CONTENT_ID: ${{ github.event.issue.node_id }}
          STATUS: ${{ inputs.status }}
        run: |
          set -euo pipefail

          case "$STATUS" in
            Todo) OPTION_ID="f75ad846" ;;
            "In Progress") OPTION_ID="47fc9ee4" ;;
            Done) OPTION_ID="98236657" ;;
            Waiting) OPTION_ID="f643db07" ;;
            *)
              echo "Unknown status: $STATUS" >&2
              exit 1
              ;;
          esac

          item_id=$(gh api graphql -f query='
            mutation($project:ID!, $content:ID!) {
              addProjectV2ItemById(input:{projectId:$project, contentId:$content}) {
                item { id }
              }
            }' -f project="$PROJECT_ID" -f content="$CONTENT_ID" -q .data.addProjectV2ItemById.item.id)

          gh api graphql -f query='
            mutation($project:ID!, $item:ID!, $field:ID!, $optId:String!) {
              updateProjectV2ItemFieldValue(input:{projectId:$project, itemId:$item, fieldId:$field, value:{singleSelectOptionId:$optId}}) {
                projectV2Item { id }
              }
            }' -f project="$PROJECT_ID" -f item="$item_id" -f field="$STATUS_FIELD_ID" -f optId="$OPTION_ID" > /dev/null

          echo "added item $item_id, status=$STATUS"
